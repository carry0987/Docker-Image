name: PHP-FPM Docker Build and Push

on:
  push:
    tags:
      - 'php-fpm-[^alpine]*'

jobs:
  build-and-push:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
          - os: ubuntu-24.04-arm
            platform: linux/arm/v7
    outputs:
      version: ${{ steps.version.outputs.version-number }}
      short-version: ${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Extract version from tag
        uses: carry0987/version-extractor@v1
        id: version
        with:
          tag: ${{ github.ref_name }}
          strict: false
          extract-pattern: 'php-fpm-(\d+\.\d+\.\d+)'

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push by digest
        uses: carry0987/docker-digest-builder@v1
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/php
          platform: ${{ matrix.platform }}
          context: ./PHP/FPM
          file: ./PHP/FPM/Dockerfile
          build-args: PHP_VERSION=${{ steps.version.outputs.version-number }}
          sbom: true

      - name: Logout from DockerHub
        if: always()
        run: docker logout

  manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Create and push manifest
        uses: carry0987/docker-multi-arch-manifest@v1
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/php
          tags: |
            ${{ needs.build-and-push.outputs.short-version }}-fpm
            ${{ needs.build-and-push.outputs.version }}-fpm
            latest

      - name: Logout from DockerHub
        if: always()
        run: docker logout
